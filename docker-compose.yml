services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - PYTHONUNBUFFERED=1
      # Supabase
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      # Firecrawl (enrichment de e-mail)
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - EMAIL_CACHE_TTL_DAYS=${EMAIL_CACHE_TTL_DAYS:-30}
      # Fonte de descoberta de leads: dataforseo (default) | scrappa (ver lead_source.py)
      - LEAD_SOURCE=${LEAD_SOURCE:-dataforseo}
      - SCRAPPA_API_KEY=${SCRAPPA_API_KEY}
      # DataForSEO (descoberta de leads — Google Maps)
      - DATAFORSEO_LOGIN=${DATAFORSEO_LOGIN}
      - DATAFORSEO_PASSWORD=${DATAFORSEO_PASSWORD}
      - DATAFORSEO_BASE_URL=${DATAFORSEO_BASE_URL:-https://api.dataforseo.com/v3}
      # Receita Federal (CNPJ → metadados)
      - BRASIL_API_CNPJ_BASE=${BRASIL_API_CNPJ_BASE:-https://brasilapi.com.br/api/cnpj/v1}
      # Criptografia de segredos (senhas SMTP em email_accounts)
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      # Feature flag: campanhas de e-mail (default off — ver docs/FEATURE_FLAGS.md)
      - ENABLE_CAMPAIGNS=${ENABLE_CAMPAIGNS:-false}
      # Kiwify
      - KIWIFY_WEBHOOK_SECRET=${KIWIFY_WEBHOOK_SECRET}
      # E-mail (SMTP)
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Client4You}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      # URLs
      - FRONTEND_URL=${FRONTEND_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      # Segurança
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
      - ADMIN_IP_WHITELIST=${ADMIN_IP_WHITELIST}
      # Rate limiting
      - LOGIN_MAX_ATTEMPTS=${LOGIN_MAX_ATTEMPTS:-5}
      - LOGIN_LOCKOUT_DURATION=${LOGIN_LOCKOUT_DURATION:-1800}
      - LOGIN_WINDOW_DURATION=${LOGIN_WINDOW_DURATION:-900}
    volumes:
      - backend-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_BACKEND_URL=${VITE_BACKEND_URL}
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY}
        - VITE_ENABLE_CAMPAIGNS=${VITE_ENABLE_CAMPAIGNS:-false}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - app_network

volumes:
  backend-uploads:
    driver: local

networks:
  app_network:
    driver: bridge
