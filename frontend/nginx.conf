server {
    # Nginx escutando na porta padrão 80 para facilitar o auto-detect do Coolify
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Tamanho máximo de upload (planilhas de leads podem chegar perto disso)
    client_max_body_size 20M;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # ─── Security headers ──────────────────────────────────────────────────────
    # HSTS: força HTTPS no domínio + subdomínios por 1 ano. Cloudflare/Coolify
    # tipicamente terminam TLS na borda; este header instrui o browser a
    # nunca tentar HTTP de novo.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Bloqueia ser carregado em <iframe> (anti-clickjacking)
    add_header X-Frame-Options "DENY" always;

    # Browser não tenta adivinhar MIME-type
    add_header X-Content-Type-Options "nosniff" always;

    # Referer não vaza para origens diferentes
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Restringe APIs que a página pode usar (camera/mic/location não fazem sentido aqui)
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # CSP: política conservadora que permite o que o app usa:
    #   - Vite/React precisam de 'unsafe-inline' e 'unsafe-eval' para hidratar
    #   - Supabase usa wss:// (Realtime) e https://*.supabase.co
    #   - Backend em api.client4you.com.br
    #   - Cloudflare Turnstile usa frame + script de challenges.cloudflare.com
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.client4you.com.br https://waha.chatyou.chat https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; upgrade-insecure-requests" always;

    # ─── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ─── SPA fallback ─────────────────────────────────────────────────────────
    # Se não achar o arquivo, manda para o index.html (evita erro 404 ao atualizar página)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Cache de estáticos ───────────────────────────────────────────────────
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    # ─── Negar acesso a dotfiles (.env, .git, etc.) ──────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ─── Health check para Coolify ────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
